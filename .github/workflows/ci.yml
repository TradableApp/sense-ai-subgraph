name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  CI:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.7

      - uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1.2.2
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Generate subgraph.yaml for testnet
        run: bun run prepare:testnet

      - name: Run codegen
        run: bun run codegen

      - name: Build subgraph
        run: bun run build

      - name: Run tests
        run: bun run test
