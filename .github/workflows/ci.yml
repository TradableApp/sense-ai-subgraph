name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  CI:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - run: bun install --frozen-lockfile

      - name: Generate subgraph.yaml for testnet
        run: bun run prepare:testnet

      - name: Run codegen
        run: bun run codegen

      - name: Build subgraph
        run: bun run build

      - name: Run tests
        run: bun run test
