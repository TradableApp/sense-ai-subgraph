name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Codegen & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate subgraph.yaml for testnet
        run: npm run prepare:testnet

      - name: Run codegen
        run: npm run codegen

      - name: Build subgraph
        run: npm run build
